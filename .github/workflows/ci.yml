name: admin-control-panel CI

on:
  push:
    branches: ["**"]
    paths:
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpstan.neon.dist'
      - 'phpunit.xml'
      - '.github/workflows/**'
  pull_request:
    branches: ["**"]
    paths:
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpstan.neon.dist'
      - 'phpunit.xml'
      - '.github/workflows/**'

jobs:
  quality:
    name: Quality Checks (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ "8.2" ]

    steps:
      # -------------------------------------------------
      # 1) Checkout
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2) Setup PHP
      # -------------------------------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      # -------------------------------------------------
      # 3) Validate composer.json
      # -------------------------------------------------
      - name: Validate composer.json
        run: composer validate --strict

      # -------------------------------------------------
      # 4) Install dependencies
      # -------------------------------------------------
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      # -------------------------------------------------
      # 5) Dump optimized autoload
      # -------------------------------------------------
      # merged into composer install via --optimize-autoloader
      # -------------------------------------------------

      # -------------------------------------------------
      # 6) Run PHPStan (Level Max)
      # -------------------------------------------------
      - name: Run PHPStan
        run: composer analyse

      # -------------------------------------------------
      # 7) Syntax Check (extra safety)
      # -------------------------------------------------
      - name: Lint PHP files
        run: |
          find . -type f -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l
