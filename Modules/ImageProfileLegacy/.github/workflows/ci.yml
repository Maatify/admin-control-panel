name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ---------------------------------------------------------------------------
  # Test suite — Unit + Integration + Contract
  # ---------------------------------------------------------------------------
  tests:
    name: PHP ${{ matrix.php }} — ${{ matrix.dependency-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]
        dependency-version: [ prefer-lowest, prefer-stable ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, gd, fileinfo
          coverage: xdebug
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ matrix.dependency-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-composer-${{ matrix.dependency-version }}-

      - name: Install dependencies
        run: composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-progress

      - name: Run Unit tests
        run: vendor/bin/phpunit --testsuite Unit --colors=always

      - name: Run Integration tests
        run: vendor/bin/phpunit --testsuite Integration --colors=always

      - name: Run Contract tests
        run: vendor/bin/phpunit --testsuite Contract --colors=always

      - name: Run full suite with coverage (stable only)
        if: matrix.dependency-version == 'prefer-stable' && matrix.php == '8.2'
        run: vendor/bin/phpunit --coverage-clover build/coverage/clover.xml --colors=always

      - name: Upload coverage report
        if: matrix.dependency-version == 'prefer-stable' && matrix.php == '8.2'
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage/clover.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Static analysis — PHPStan level 10
  # ---------------------------------------------------------------------------
  static-analysis:
    name: PHPStan — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, gd, fileinfo
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-stable-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-composer-stable-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  # ---------------------------------------------------------------------------
  # Dependency audit — flag known CVEs
  # ---------------------------------------------------------------------------
  audit:
    name: Composer audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Audit for known vulnerabilities
        run: composer audit
